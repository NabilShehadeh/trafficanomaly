<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Anomaly Detection - Interactive Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1rem; background: #0f1419; color: #e6edf3; }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
    .sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }
    a { color: #58a6ff; }
    .chart { margin-bottom: 2rem; background: #161b22; border-radius: 8px; padding: 1rem; }
    .chart h2 { margin: 0 0 0.75rem; font-size: 1.1rem; font-weight: 600; }
    .plot-container { width: 100%; height: 400px; background: #161b22; }
    svg { display: block; width: 100%; height: 100%; }
    .legend { margin-top: 8px; font-size: 0.85rem; }
    .legend span { margin-right: 16px; }
    .legend .packets { color: #58a6ff; }
    .legend .anomalies { color: #f85149; }
    .heatmap-table { border-collapse: collapse; width: 100%; font-size: 0.75rem; }
    .heatmap-table th, .heatmap-table td { border: 1px solid #30363d; padding: 4px 6px; text-align: center; min-width: 36px; }
    .heatmap-table th { background: #21262d; color: #8b949e; }
    .bar-row { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin-bottom: 24px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .bar { width: 100%; min-height: 2px; background: #58a6ff; border-radius: 2px 2px 0 0; transition: opacity 0.2s; }
    .bar-wrap.anomaly .bar { background: #f85149; }
    .bar-label { font-size: 0.7rem; color: #8b949e; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Traffic Anomaly Detection</h1>
  <p class="sub">Interactive graph, histogram and heatmap. <a href="https://github.com/NabilShehadeh/trafficanomaly">View repo</a></p>

  <div class="chart">
    <h2>Interactive graph - Traffic over time</h2>
    <div id="graph" class="plot-container"></div>
    <div class="legend" id="graph-legend"><span class="packets">Packets</span><span class="anomalies">Anomalies</span></div>
  </div>
  <div class="chart">
    <h2>Interactive histogram - Packet length and anomaly scores</h2>
    <div id="histogram" class="plot-container"></div>
  </div>
  <div class="chart">
    <h2>Interactive heatmap - Feature correlations</h2>
    <div id="heatmap" class="plot-container"></div>
  </div>

  <script>
    (function() {
      var bucket = [0, 40, 80, 120, 160, 200, 240, 280, 320, 360, 400, 440, 480, 520, 560, 600, 640, 680, 720, 760];
      var packets = [42, 38, 55, 61, 48, 72, 88, 51, 45, 59, 63, 71, 49, 82, 67, 54, 90, 58, 44, 76];
      var anomalies = [2, 1, 3, 2, 2, 4, 5, 2, 1, 3, 3, 4, 2, 4, 3, 2, 5, 3, 2, 4];
      var packetLengths = [64, 128, 256, 512, 768, 1024, 1280, 1500];
      var lengthCounts = [120, 340, 280, 180, 95, 60, 45, 80];
      var anomalyScores = [-0.15, -0.10, -0.05, 0, 0.05, 0.10, 0.15];
      var scoreCounts = [80, 220, 350, 420, 180, 90, 60];
      var features = ['src_port', 'dst_port', 'pkt_len', 'duration', 'bytes_sent', 'bytes_rcv', 'pkts_sent', 'pkts_rcv'];
      var corrMatrix = [
        [1, 0.02, 0.1, 0.05, 0.3, 0.2, 0.4, 0.25],
        [0.02, 1, 0.08, 0.03, 0.15, 0.18, 0.12, 0.2],
        [0.1, 0.08, 1, 0.22, 0.35, 0.28, 0.32, 0.3],
        [0.05, 0.03, 0.22, 1, 0.4, 0.35, 0.38, 0.36],
        [0.3, 0.15, 0.35, 0.4, 1, 0.7, 0.85, 0.72],
        [0.2, 0.18, 0.28, 0.35, 0.7, 1, 0.68, 0.8],
        [0.4, 0.12, 0.32, 0.38, 0.85, 0.68, 1, 0.75],
        [0.25, 0.2, 0.3, 0.36, 0.72, 0.8, 0.75, 1]
      ];

      function drawLineChart() {
        var el = document.getElementById('graph');
        if (!el) return;
        var w = el.offsetWidth;
        var h = el.offsetHeight;
        var pad = { top: 20, right: 20, bottom: 40, left: 45 };
        var plotW = w - pad.left - pad.right;
        var plotH = h - pad.top - pad.bottom;

        var maxP = Math.max.apply(null, packets);
        var maxA = Math.max.apply(null, anomalies);
        var maxY = Math.max(maxP, maxA, 1);
        var minX = bucket[0];
        var maxX = bucket[bucket.length - 1];

        function xScale(x) { return pad.left + (x - minX) / (maxX - minX || 1) * plotW; }
        function yScaleP(y) { return pad.top + plotH - (y / maxY) * plotH; }
        function yScaleA(y) { return pad.top + plotH - (y / maxY) * plotH; }

        var pathPackets = bucket.map(function(x, i) { return xScale(x) + ',' + yScaleP(packets[i]); }).join(' ');
        var pathAnomalies = bucket.map(function(x, i) { return xScale(x) + ',' + yScaleA(anomalies[i]); }).join(' ');

        var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet">';
        svg += '<line x1="' + pad.left + '" y1="' + (pad.top + plotH) + '" x2="' + (pad.left + plotW) + '" y2="' + (pad.top + plotH) + '" stroke="#30363d" stroke-width="1"/>';
        svg += '<line x1="' + pad.left + '" y1="' + pad.top + '" x2="' + pad.left + '" y2="' + (pad.top + plotH) + '" stroke="#30363d" stroke-width="1"/>';
        svg += '<polyline fill="none" stroke="#58a6ff" stroke-width="2" stroke-linejoin="round" points="' + pathPackets + '"/>';
        svg += '<polyline fill="none" stroke="#f85149" stroke-width="2" stroke-linejoin="round" points="' + pathAnomalies + '"/>';
        for (var i = 0; i < bucket.length; i += 4) {
          svg += '<circle cx="' + xScale(bucket[i]) + '" cy="' + yScaleP(packets[i]) + '" r="3" fill="#58a6ff"/>';
          svg += '<circle cx="' + xScale(bucket[i]) + '" cy="' + yScaleA(anomalies[i]) + '" r="3" fill="#f85149"/>';
        }
        svg += '<text x="' + pad.left + '" y="' + (pad.top - 5) + '" fill="#8b949e" font-size="11">Count</text>';
        svg += '<text x="' + (pad.left + plotW / 2) + '" y="' + (h - 5) + '" fill="#8b949e" font-size="11" text-anchor="middle">Sample bucket</text>';
        svg += '</svg>';
        el.innerHTML = svg;
      }

      function drawHistogram() {
        var el = document.getElementById('histogram');
        if (!el) return;
        var maxLen = Math.max.apply(null, lengthCounts);
        var maxScore = Math.max.apply(null, scoreCounts);
        var maxH = 120;

        var html = '<div style="padding: 10px 0;">';
        html += '<div style="margin-bottom: 8px; color: #8b949e; font-size: 0.8rem;">Packet length (bytes)</div>';
        html += '<div class="bar-row">';
        for (var i = 0; i < packetLengths.length; i++) {
          var pct = maxLen > 0 ? lengthCounts[i] / maxLen : 0;
          html += '<div class="bar-wrap"><div class="bar" style="height: ' + (pct * maxH) + 'px" title="' + packetLengths[i] + ': ' + lengthCounts[i] + '"></div><div class="bar-label">' + packetLengths[i] + '</div></div>';
        }
        html += '</div>';
        html += '<div style="margin-top: 24px; margin-bottom: 8px; color: #8b949e; font-size: 0.8rem;">Anomaly score</div>';
        html += '<div class="bar-row">';
        for (var j = 0; j < anomalyScores.length; j++) {
          var pct2 = maxScore > 0 ? scoreCounts[j] / maxScore : 0;
          html += '<div class="bar-wrap anomaly"><div class="bar" style="height: ' + (pct2 * maxH) + 'px" title="' + anomalyScores[j] + ': ' + scoreCounts[j] + '"></div><div class="bar-label">' + anomalyScores[j] + '</div></div>';
        }
        html += '</div></div>';
        el.innerHTML = html;
      }

      function heatmapColor(v) {
        if (v <= 0) return 'rgb(35, 134, 54)';
        if (v >= 1) return 'rgb(218, 54, 51)';
        var r = Math.round(35 + (218 - 35) * v);
        var g = Math.round(134 + (54 - 134) * v);
        var b = Math.round(54 + (51 - 54) * v);
        return 'rgb(' + r + ',' + g + ',' + b + ')';
      }

      function drawHeatmap() {
        var el = document.getElementById('heatmap');
        if (!el) return;
        var table = '<table class="heatmap-table"><thead><tr><th></th>';
        for (var f = 0; f < features.length; f++) table += '<th>' + features[f] + '</th>';
        table += '</tr></thead><tbody>';
        for (var i = 0; i < corrMatrix.length; i++) {
          table += '<tr><th>' + features[i] + '</th>';
          for (var j = 0; j < corrMatrix[i].length; j++) {
            var v = corrMatrix[i][j];
            var color = heatmapColor((v + 0.2) / 1.2);
            table += '<td style="background:' + color + '; color:' + (v > 0.5 ? '#fff' : '#e6edf3') + '" title="' + v + '">' + v.toFixed(2) + '</td>';
          }
          table += '</tr>';
        }
        table += '</tbody></table>';
        el.innerHTML = '<div style="overflow-x: auto; padding: 8px 0;">' + table + '</div>';
      }

      function init() {
        drawLineChart();
        drawHistogram();
        drawHeatmap();
        window.addEventListener('resize', function() {
          drawLineChart();
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
